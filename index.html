<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>RAATHIRI PADAM</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080d;--surface:#0d1018;--surface2:#141820;--surface3:#1a2030;
  --gold:#e8b84b;--gold2:#f5d07a;--red:#e84b4b;--green:#3dd68c;--blue:#4b8fe8;
  --text:#eeeae0;--muted:#5a6278;--border:rgba(255,255,255,.07);
  --radius:10px;--sb:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(232,184,75,.06),transparent);}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.spin{display:inline-block;animation:spin 1s linear infinite;}

/* ═══ LANDING ═══ */
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:1.5rem;overflow-y:auto;}
.logo-wrap{text-align:center;margin-bottom:2rem;}
.logo-mark{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:.1em;
  background:linear-gradient(135deg,var(--gold),var(--gold2) 60%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.logo-tag{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-top:.3rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:1.75rem;width:100%;max-width:380px;box-shadow:0 40px 80px rgba(0,0,0,.7);}
.tabs{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:1.5rem;}
.tb{flex:1;padding:.5rem;border:none;background:none;color:var(--muted);
  font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;border-radius:6px;cursor:pointer;transition:all .2s;}
.tb.active{background:var(--surface2);color:var(--text);}
.tp{display:none;}.tp.active{display:block;}
.lbl{display:block;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:.72rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;
  transition:border-color .2s;-webkit-appearance:none;margin-bottom:.9rem;}
.inp:focus{border-color:rgba(232,184,75,.4);}
.inp::placeholder{color:var(--muted);}
.btn-gold{display:block;width:100%;padding:.85rem;border:none;border-radius:8px;cursor:pointer;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0800;
  font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.1em;transition:opacity .15s;}
.btn-gold:hover{opacity:.9;}
.link-note{font-size:.7rem;color:var(--muted);margin-top:.6rem;text-align:center;}

/* ═══ ROOM ═══ */
#room{display:none;flex-direction:column;height:100vh;height:100dvh;}
.hdr{display:flex;align-items:center;gap:.5rem;padding:.45rem .8rem;
  background:rgba(13,16,24,.95);border-bottom:1px solid var(--border);flex-shrink:0;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.hdr-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.room-code{font-family:'DM Mono',monospace;font-size:.68rem;background:var(--surface2);
  border:1px solid var(--border);border-radius:6px;padding:.18rem .5rem;color:var(--gold);cursor:pointer;
  white-space:nowrap;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0;}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green);}
.hdr-gap{flex:1;}
.hb{background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  padding:.32rem .65rem;font-size:.75rem;cursor:pointer;color:var(--text);
  font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:.3rem;
  position:relative;transition:background .15s;white-space:nowrap;
  min-height:34px;min-width:34px;justify-content:center;}
.hb:hover{background:var(--surface3);}
.hb.active{background:rgba(232,184,75,.12);border-color:rgba(232,184,75,.25);color:var(--gold);}
.nb{position:absolute;top:-5px;right:-5px;background:var(--red);color:#fff;
  font-size:.5rem;min-width:14px;height:14px;border-radius:7px;padding:0 2px;
  display:flex;align-items:center;justify-content:center;font-weight:700;}
.host-badge{display:none;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;
  background:rgba(232,184,75,.15);color:var(--gold);border:1px solid rgba(232,184,75,.3);
  border-radius:5px;padding:.12rem .4rem;font-family:'DM Mono',monospace;}
.host-badge.show{display:inline-block;}

/* ── ROOM BODY ── */
.room-body{flex:1;min-height:0;display:flex;overflow:hidden;}

/* ── PLAYER SIDE ── */
#playerSide{flex:1;min-width:0;display:flex;flex-direction:column;background:#000;position:relative;overflow:hidden;}
#playerWrap{flex:1;min-height:0;position:relative;background:#000;overflow:hidden;}
#playerWrap video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;background:#000;}
#playerWrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#000;display:block;}

/* empty state */
#emptyState{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:1.1rem;z-index:2;background:var(--bg);padding:1.5rem;}
#emptyState.hidden{display:none;}
.es-icon{width:72px;height:72px;opacity:.22;flex-shrink:0;}
.es-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--muted);letter-spacing:.06em;}
.es-sub{font-size:.82rem;color:var(--muted);opacity:.6;text-align:center;max-width:220px;line-height:1.6;}
.es-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0800;border:none;
  border-radius:10px;padding:.75rem 1.75rem;font-family:'Bebas Neue',sans-serif;font-size:1rem;
  letter-spacing:.1em;cursor:pointer;min-height:44px;}

/* Viewer lock over iframe */
#iframeLock{display:none;position:absolute;inset:0;z-index:4;cursor:default;}
#iframeLock.active{display:block;}

/* Sync banner */
#syncBanner{display:none;position:absolute;top:.5rem;left:50%;transform:translateX(-50%);
  z-index:20;background:rgba(13,16,24,.92);border:1px solid rgba(232,184,75,.3);
  color:var(--gold);font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;
  padding:.3rem .75rem;border-radius:20px;pointer-events:none;white-space:nowrap;
  backdrop-filter:blur(8px);}
#syncBanner.show{display:block;}

/* Pause overlay */
#pauseOverlay{display:none;position:absolute;inset:0;z-index:5;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;}
#pauseOverlay.paused{display:flex;background:rgba(0,0,0,.6);}
#pauseOverlay.tap{display:flex;background:rgba(0,0,0,0);}
.po-icon{font-size:3rem;color:var(--gold);opacity:.85;}
.po-label{font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.15em;color:var(--text);}

/* controls */
.cbar{display:flex;align-items:center;gap:.4rem;padding:.45rem .65rem;
  background:rgba(7,8,13,.97);border-top:1px solid var(--border);flex-shrink:0;position:relative;}
.cb{background:none;border:none;color:var(--text);cursor:pointer;font-size:1rem;
  padding:.28rem .38rem;border-radius:6px;transition:background .15s;line-height:1;}
.cb:hover{background:var(--surface2);}
.pbar-wrap{flex:1;display:flex;align-items:center;gap:.4rem;}
.tdisp{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);white-space:nowrap;min-width:78px;}
.pbar{flex:1;height:3px;background:var(--surface3);border-radius:3px;cursor:pointer;position:relative;transition:height .15s;}
.pbar:hover{height:5px;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;pointer-events:none;width:0%;}
.vol-row{display:flex;align-items:center;gap:.3rem;}
.vol-sl{-webkit-appearance:none;appearance:none;width:55px;height:3px;background:var(--surface3);border-radius:3px;outline:none;cursor:pointer;}
.vol-sl::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--gold);cursor:pointer;}
.sync-pill{font-size:.6rem;font-family:'DM Mono',monospace;color:var(--gold);background:rgba(232,184,75,.1);border:1px solid rgba(232,184,75,.2);border-radius:4px;padding:.1rem .38rem;opacity:0;transition:opacity .4s;}
.sync-pill.show{opacity:1;}
.cbar.viewer-mode .cb:not(#btnMute):not(.vol-only),
.cbar.viewer-mode .pbar,
.cbar.viewer-mode #btnPP{opacity:.35;pointer-events:none;}
.cbar.viewer-mode::after{content:'HOST CONTROLS PLAYBACK';font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.1em;color:var(--muted);position:absolute;right:.65rem;top:50%;transform:translateY(-50%);pointer-events:none;white-space:nowrap;}

/* ── SIDE PANEL ── */
#side{display:none;width:310px;flex-shrink:0;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);}
#side.open{display:flex;}
.ptabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.pt{flex:1;padding:.6rem .4rem;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.73rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.pt.active{color:var(--gold);border-bottom-color:var(--gold);}
.pcontent{flex:1;min-height:0;display:none;flex-direction:column;}
.pcontent.active{display:flex;}

/* search */
.search-bar{display:flex;gap:.4rem;padding:.6rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.search-bar input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:.5rem .7rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;}
.search-bar input:focus{border-color:rgba(232,184,75,.35);}
.search-bar button{background:var(--gold);border:none;border-radius:7px;padding:.5rem .75rem;color:#0a0800;cursor:pointer;font-size:.85rem;font-weight:600;}
.results-wrap{flex:1;overflow-y:auto;}
.results-wrap::-webkit-scrollbar{width:3px;}
.results-wrap::-webkit-scrollbar-thumb{background:var(--border);}
.movie-card{display:flex;gap:.65rem;padding:.6rem .65rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;align-items:flex-start;}
.movie-card:hover{background:var(--surface2);}
.mc-poster{width:40px;height:58px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--surface3);}
.mc-info{flex:1;min-width:0;}
.mc-title{font-size:.82rem;font-weight:500;line-height:1.3;margin-bottom:.2rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.mc-meta{font-size:.68rem;color:var(--muted);margin-bottom:.3rem;}
.mc-rating{font-size:.68rem;color:var(--gold);}
.mc-btn{background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:.28rem .6rem;color:var(--text);font-size:.7rem;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:.35rem;transition:background .15s;white-space:nowrap;}
.mc-btn:hover{background:rgba(232,184,75,.15);color:var(--gold);border-color:rgba(232,184,75,.3);}
.section-lbl{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:.5rem .65rem .25rem;}

/* stream picker */
#streamPicker{display:none;flex-direction:column;position:absolute;inset:0;background:var(--surface);z-index:10;}
#streamPicker.open{display:flex;}
.sp-hdr{display:flex;align-items:center;gap:.5rem;padding:.7rem .8rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.sp-title{flex:1;font-size:.85rem;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.sp-back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:.2rem;}
.sp-addon-url{padding:.5rem .65rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.sp-addon-url input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.42rem .65rem;color:var(--text);font-family:'DM Mono',monospace;font-size:.68rem;outline:none;margin-bottom:.3rem;}
.sp-addon-url input:focus{border-color:rgba(232,184,75,.35);}
.sp-addon-url button{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:.38rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer;}
.sp-addon-url button:hover{background:rgba(232,184,75,.1);color:var(--gold);}
.stream-list{flex:1;overflow-y:auto;}
.stream-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .65rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;}
.stream-item:hover{background:var(--surface2);}
.si-icon{font-size:1.1rem;flex-shrink:0;}
.si-info{flex:1;min-width:0;}
.si-name{font-size:.8rem;font-weight:500;}
.si-desc{font-size:.68rem;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.si-play{background:var(--gold);border:none;border-radius:6px;padding:.3rem .6rem;color:#0a0800;font-size:.72rem;font-weight:600;cursor:pointer;white-space:nowrap;}
.sp-loading{display:flex;align-items:center;justify-content:center;flex:1;color:var(--muted);font-size:.82rem;gap:.5rem;}
.sp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--muted);font-size:.82rem;gap:.5rem;text-align:center;padding:1rem;}

/* chat */
#chatMsgs{flex:1;overflow-y:auto;padding:.65rem;display:flex;flex-direction:column;gap:.35rem;}
#chatMsgs::-webkit-scrollbar{width:3px;}
#chatMsgs::-webkit-scrollbar-thumb{background:var(--border);}
.msg{max-width:88%;}
.msg.me{align-self:flex-end;}
.msg-n{font-size:.6rem;color:var(--muted);margin-bottom:.12rem;padding:0 .35rem;}
.msg-b{padding:.38rem .6rem;border-radius:9px;font-size:.8rem;line-height:1.45;word-break:break-word;}
.msg.me .msg-b{background:rgba(232,184,75,.17);color:var(--gold2);border-bottom-right-radius:3px;}
.msg:not(.me) .msg-b{background:var(--surface2);border-bottom-left-radius:3px;}
.msg.sys{align-self:center;max-width:100%;}
.msg.sys .msg-b{background:none;color:var(--muted);font-size:.7rem;font-style:italic;}
.chat-row{display:flex;gap:.4rem;padding:.5rem;border-top:1px solid var(--border);flex-shrink:0;}
.chat-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:.48rem .65rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none;}
.chat-row input:focus{border-color:rgba(232,184,75,.3);}
.chat-send{background:var(--gold);border:none;border-radius:7px;padding:.48rem .7rem;color:#0a0800;cursor:pointer;font-size:.8rem;font-weight:600;}

/* viewers */
#viewerList{flex:1;overflow-y:auto;padding:.5rem;}
.vrow{display:flex;align-items:center;gap:.55rem;padding:.38rem .45rem;border-radius:7px;}
.vav{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;color:#fff;flex-shrink:0;}
.vname{flex:1;font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vbadge{font-size:.58rem;background:rgba(232,184,75,.15);color:var(--gold);border-radius:4px;padding:.1rem .3rem;}

/* movie detail modal */
#detailModal{display:none;position:fixed;inset:0;z-index:200;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);}
#detailModal.open{display:flex;}
.dm-box{background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 0 0;width:100%;max-width:480px;max-height:88dvh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .25s ease;}
.dm-hero{position:relative;height:160px;flex-shrink:0;background:var(--surface2);overflow:hidden;}
.dm-bg{width:100%;height:100%;object-fit:cover;opacity:.4;}
.dm-overlay{position:absolute;inset:0;background:linear-gradient(to top,var(--surface) 0%,transparent 60%);}
.dm-poster{position:absolute;bottom:-1px;left:1.25rem;width:70px;height:100px;border-radius:7px;object-fit:cover;border:2px solid var(--surface3);box-shadow:0 8px 24px rgba(0,0,0,.6);}
.dm-hdr-info{position:absolute;bottom:.8rem;left:calc(70px + 1.75rem);right:1rem;}
.dm-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.05em;line-height:1.1;}
.dm-year{font-size:.72rem;color:var(--muted);margin-top:.15rem;}
.dm-body{flex:1;overflow-y:auto;padding:1rem 1.25rem;}
.dm-close{position:absolute;top:.7rem;right:.8rem;background:rgba(0,0,0,.5);border:none;color:var(--text);cursor:pointer;font-size:1rem;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.dm-desc{font-size:.8rem;color:rgba(238,234,224,.7);line-height:1.6;margin-bottom:1rem;}
.dm-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:1rem;}
.dm-tag{font-size:.65rem;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:.15rem .55rem;color:var(--muted);}
.dm-rating{font-size:.8rem;color:var(--gold);margin-bottom:1rem;}
.dm-watch-btn{width:100%;padding:.8rem;border:none;border-radius:9px;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0800;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.08em;margin-bottom:.5rem;}
.dm-queue-btn{width:100%;padding:.65rem;border:1px solid var(--border);background:var(--surface2);border-radius:9px;cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;margin-bottom:1rem;}

/* toast */
#toast{position:fixed;bottom:calc(1.5rem + var(--sb));left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(13,16,24,.97);border:1px solid var(--border);border-radius:10px;
  padding:.55rem 1.1rem;font-size:.78rem;color:var(--text);white-space:nowrap;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .25s;
  opacity:0;z-index:9999;pointer-events:none;backdrop-filter:blur(12px);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* src switcher */
.src-switcher{position:absolute;top:.6rem;right:.6rem;z-index:10;display:flex;gap:.3rem;flex-wrap:wrap;justify-content:flex-end;pointer-events:auto;}

/* RTC live badge */
.rtc-live-badge{position:absolute;top:.6rem;left:.6rem;z-index:10;background:rgba(232,75,75,.9);color:#fff;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;padding:.22rem .55rem;border-radius:6px;pointer-events:none;}

/* Episode picker */
#epPicker{position:fixed;inset:0;z-index:500;background:rgba(7,8,13,.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;padding:2rem;backdrop-filter:blur(8px);}
#epPicker.open{display:flex;}
.ep-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold);letter-spacing:.08em;text-align:center;}
.ep-row{display:flex;gap:.8rem;}
.ep-group label{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.35rem;}
.ep-group input{width:72px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.65rem;color:var(--text);font-size:1.1rem;text-align:center;outline:none;}
</style>
</head>
<body>

<!-- ═══ LANDING ═══ -->
<section id="landing">
  <div class="logo-wrap">
    <div class="logo-mark">RAATHIRI PADAM</div>
    <div class="logo-tag">Watch Together · Real-time Sync</div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tb active" onclick="switchTab('create')">Create Room</button>
      <button class="tb" onclick="switchTab('join')">Join Room</button>
    </div>
    <!-- create -->
    <div class="tp active" id="tp-create">
      <label class="lbl">Your Name</label>
      <input class="inp" id="createName" type="text" placeholder="Enter your name" maxlength="30" autocomplete="off"
        onkeydown="if(event.key==='Enter')createRoom()">
      <button class="btn-gold" onclick="createRoom()">CREATE ROOM</button>
    </div>
    <!-- join -->
    <div class="tp" id="tp-join">
      <label class="lbl">Your Name</label>
      <input class="inp" id="joinName" type="text" placeholder="Enter your name" maxlength="30" autocomplete="off">
      <label class="lbl">Room Code</label>
      <input class="inp" id="joinCode" type="text" placeholder="e.g. AB12CD" maxlength="8"
        autocomplete="off" style="text-transform:uppercase;letter-spacing:.1em"
        onkeydown="if(event.key==='Enter')joinRoom()">

<!-- Socket.IO (loaded from same server) -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
/* ══════════════════════════════════════════════════════
   RAATHIRI PADAM — Fixed Watch-Party Client
   Socket.IO + WebRTC
   ══════════════════════════════════════════════════════ */

const $ = id => document.getElementById(id);
const genId = () => Math.random().toString(36).slice(2,10);
const genCode = () => Math.random().toString(36).slice(2,8).toUpperCase();
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const avc = n => {const c=['#c0392b','#d35400','#c99b00','#27ae60','#2980b9','#8e44ad','#16a085'];return c[n.charCodeAt(0)%c.length];};
const avl = n => n?n[0].toUpperCase():'?';
const fmt = s => {s=Math.floor(s||0);return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;};

/* ── State ── */
const S = {
  name:'', room:'', myId:genId(), socketId:null,
  isHost:false, hostSocketId:null,
  socket:null, connected:false,
  peers:{},           // socketId → {name, id}
  video:null, iframe:null, src:null,
  playing:false, muted:false, vol:80, _suppress:false,
  panelOpen:false, panelTab:'search', unread:0,
  currentMeta:null, currentImdbId:null, currentType:'movie',
  _currentSeason:null, _currentEpisode:null,
  addonUrl: localStorage.getItem('rp_addon')||'',
  // iframe time tracking (wall-clock estimation)
  _iframeStartWallTime:null, _iframeStartOffset:0, _estDuration:7200,
};

/* ══════════════════════════════════════════════════════
   LANDING
   ══════════════════════════════════════════════════════ */

// Auto-fill room code from URL if ?room=XXX
(function(){
  const p = new URLSearchParams(location.search);
  const rc = p.get('room');
  if(rc){
    switchTab('join');
    $('joinCode').value = rc.toUpperCase();
    $('linkNote').textContent = 'Room code auto-filled from link';
  }
})();

function switchTab(t){
  document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='create')||(i===1&&t==='join')));
  $('tp-create').classList.toggle('active',t==='create');
  $('tp-join').classList.toggle('active',t==='join');
}

function createRoom(){
  const n=$('createName').value.trim();
  if(!n){toast('Enter your name');return;}
  S.name=n; S.room=genCode(); S.isHost=true;
  enterRoom();
}

function joinRoom(){
  const n=$('joinName').value.trim(), c=$('joinCode').value.trim().toUpperCase();
  if(!n){toast('Enter your name');return;}
  if(c.length<4){toast('Enter room code');return;}
  S.name=n; S.room=c; S.isHost=false; // server decides actual host
  enterRoom();
}

function enterRoom(){
  $('codeDisplay').textContent='🎬 '+S.room;
  $('landing').style.display='none';
  $('room').style.display='flex';
  updateHostUI();
  connectSocket();
  renderViewers();
  sysMsg('You joined — Welcome 🍿');
  loadPopular();
  if(S.addonUrl) $('addonUrlInp').value=S.addonUrl;
  // Update URL for easy sharing
  history.replaceState(null,'','?room='+S.room);
}

/* ══════════════════════════════════════════════════════
   SOCKET.IO
   ══════════════════════════════════════════════════════ */

function connectSocket(){
  const socket = io('https://movie-20x6.onrender.com', { transports: ['polling', 'websocket'] });
  S.socket = socket;

  socket.on('connect', () => {
    S.socketId = socket.id;
    S.connected = true;
    setDot(true);
    socket.emit('join-room', { roomCode:S.room, name:S.name, userId:S.myId });
  });

  socket.on('disconnect', () => {
    S.connected = false;
    setDot(false);
    toast('Disconnected — reconnecting…');
  });

  socket.on('reconnect', () => {
    S.connected = true;
    S.socketId = socket.id;
    setDot(true);
    socket.emit('join-room', { roomCode:S.room, name:S.name, userId:S.myId });
  });

  /* ── Room joined (server response to our join) ── */
  socket.on('room-joined', ({ isHost, hostId, state, users }) => {
    S.isHost = isHost;
    S.hostSocketId = hostId;
    // Rebuild peers map from user list
    S.peers = {};
    users.forEach(u => {
      if(u.id !== S.myId) S.peers[u.id] = u.name;
    });
    updateHostUI();
    renderViewers();
    if(isHost){
      sysMsg('You are the host 👑');
      startHeartbeat();
    } else {
      sysMsg('Joined — requesting sync…');
      setTimeout(() => socket.emit('req-sync'), 800);
    }
  });

  /* ── New user joined ── */
  socket.on('user-joined', ({ id, socketId, name }) => {
    if(id === S.myId) return;
    S.peers[id] = name;
    renderViewers();
    sysMsg(name+' joined 🍿');
    toast(name+' joined');
    // Host pushes state to new viewer after a short delay
    if(S.isHost && S.src){
      setTimeout(() => socket.emit('sync-state', { ...buildState(), to: socketId }), 900);
    }
  });

  /* ── User left ── */
  socket.on('user-left', ({ id, name }) => {
    sysMsg((name||'Someone')+' left');
    delete S.peers[id];
    renderViewers();
  });

  /* ── Host changed ── */
  socket.on('host-change', ({ newHostSocketId, newHostId, newHostName }) => {
    S.hostSocketId = newHostSocketId;
    if(newHostId === S.myId){
      S.isHost = true;
      updateHostUI();
      sysMsg('You are now the host 👑');
      toast('You became the host');
      startHeartbeat();
    } else {
      sysMsg((newHostName||'Someone')+' is now the host 👑');
    }
    updateHostUI();
  });

  /* ── Play ── */
  socket.on('play', ({ time, from }) => {
    if(S.isHost) return;
    const name = S.peers[from]||'Host';
    const t = time||0;
    if(S.video){
      S.video.currentTime=t;
      S.video.play().catch(()=>{});
    } else if(S.iframe){
      reloadIframeAtTime(t);
      S._iframeStartWallTime=Date.now();
    }
    S._iframeStartOffset=t;
    S.playing=true; $('btnPP').textContent='⏸';
    flashSync(); sysMsg(name+' pressed play ▶');
  });

  /* ── Pause ── */
  socket.on('pause', ({ time, from }) => {
    if(S.isHost) return;
    const name = S.peers[from]||'Host';
    const t = time||0;
    S._iframeStartOffset=t; S._iframeStartWallTime=null;
    if(S.video){S.video.pause(); S.video.currentTime=t;}
    else if(S.iframe){showPauseOverlay();}
    S.playing=false; $('btnPP').textContent='▶';
    flashSync(); sysMsg(name+' paused ⏸');
  });

  /* ── Seek ── */
  socket.on('seek', ({ time, from }) => {
    if(S.isHost) return;
    const t = time||0;
    if(S.video){ S.video.currentTime=t; }
    else if(S.iframe&&S.playing){ reloadIframeAtTime(t); }
    S._iframeStartOffset=t;
    S._iframeStartWallTime = S.playing ? Date.now() : null;
    flashSync();
  });

  /* ── Load stream (from host) ── */
  socket.on('load-stream', (payload) => {
    if(S.isHost) return;
    S._iframeStartOffset=0; S._iframeStartWallTime=null;
    const title = payload.title||'';
    if(payload.imdbId){
      _embedSources = buildEmbedUrls(payload.imdbId, payload.mediaType||'movie', payload.season, payload.episode);
      _embedIdx=0; _embedTitle=title;
      S.currentImdbId=payload.imdbId; S.currentType=payload.mediaType||'movie';
      if(payload.season) S._currentSeason=payload.season;
      if(payload.episode) S._currentEpisode=payload.episode;
      playEmbed(0);
    } else if(payload.url){
      loadStream(payload.url, title, false);
    }
    sysMsg((S.peers[payload.from]||'Host')+' loaded: '+title);
    toast('🎬 Loading: '+title);
  });

  /* ── Sync state (full state from host) ── */
  socket.on('sync-state', (payload) => {
    if(S.isHost) return;
    showSyncBanner();
    const t = payload.time||0;
    const needsLoad = payload.imdbId
      ? (S.currentImdbId !== payload.imdbId)
      : (payload.url && payload.url !== S.src);

    function applyTimeAndPlay(){
      S._iframeStartOffset=t;
      if(S.iframe && payload.playing){
        reloadIframeAtTime(t); S._iframeStartWallTime=Date.now();
        S.playing=true; $('btnPP').textContent='⏸';
      } else if(S.iframe && !payload.playing){
        S._iframeStartWallTime=null; showPauseOverlay();
        S.playing=false; $('btnPP').textContent='▶';
      } else if(S.video){
        S.video.currentTime=t;
        payload.playing ? S.video.play().catch(()=>{}) : S.video.pause();
        S.playing=payload.playing; $('btnPP').textContent=payload.playing?'⏸':'▶';
      }
      hideSyncBanner(); flashSync(); toast('⟳ Synced');
    }

    if(needsLoad){
      if(payload.imdbId){
        _embedSources=buildEmbedUrls(payload.imdbId, payload.mediaType||'movie', payload.season, payload.episode);
        _embedIdx=0; _embedTitle=payload.title||'';
        S.currentImdbId=payload.imdbId; S.currentType=payload.mediaType||'movie';
        S._currentSeason=payload.season||null; S._currentEpisode=payload.episode||null;
        playEmbed(0);
        setTimeout(applyTimeAndPlay, 1500);
      } else if(payload.url){
        loadStream(payload.url, payload.title||'', false);
        setTimeout(applyTimeAndPlay, 1200);
      } else {
        hideSyncBanner();
      }
    } else {
      applyTimeAndPlay();
    }
  });

  /* ── Server asks host to push sync to a specific viewer ── */
  socket.on('push-sync', ({ to }) => {
    if(!S.isHost) return;
    socket.emit('sync-state', { ...buildState(), to });
  });

  /* ── Heartbeat (drift correction) ── */
  socket.on('heartbeat', ({ time, ts }) => {
    if(S.isHost) return;
    if(!S.src || !S.playing) return;
    const hostTime = time + (Date.now()-ts)/1000;
    const myTime = getCT();
    const drift = Math.abs(myTime - hostTime);
    if(drift > 3){
      S._iframeStartOffset=hostTime; S._iframeStartWallTime=Date.now();
      if(S.iframe && S.playing) reloadIframeAtTime(hostTime);
      else if(S.video) S.video.currentTime=hostTime;
      flashSync();
    }
  });

  /* ── Chat ── */
  socket.on('chat', ({ name, text, from }) => {
    if(from === S.myId) return;
    renderMsg({name, text}, false);
    if(S.panelTab!=='chat'||!S.panelOpen){
      S.unread++;
      const b=$('chatBadge'); b.classList.remove('hidden'); b.textContent=S.unread>9?'9+':S.unread;
    }
  });

  /* ── WebRTC signaling ── */
  socket.on('rtc-start', ({ hostSocketId }) => {
    if(S.isHost) return;
    sysMsg('Host is sharing screen — connecting…');
    showSyncBanner();
    socket.emit('rtc-join');
  });
  socket.on('rtc-stop', () => {
    if(S.isHost) return;
    cleanupViewerRTC();
    sysMsg('Host stopped screen share');
    toast('Host stopped screen share');
  });
  socket.on('rtc-join', ({ from, name }) => {
    if(!S.isHost || !_hostStream) return;
    createHostPeerForViewer(from);
  });
  socket.on('rtc-offer', ({ from, sdp }) => {
    if(S.isHost) return;
    handleHostOffer(sdp, from);
  });
  socket.on('rtc-answer', ({ from, sdp }) => {
    if(!S.isHost) return;
    const pc = _hostPeers[from];
    if(pc) pc.setRemoteDescription(new RTCSessionDescription(sdp)).catch(console.error);
  });
  socket.on('rtc-ice', ({ from, candidate }) => {
    try {
      if(S.isHost){
        const pc = _hostPeers[from];
        if(pc && candidate) pc.addIceCandidate(new RTCIceCandidate(candidate));
      } else {
        if(_viewerPc && candidate) _viewerPc.addIceCandidate(new RTCIceCandidate(candidate));
      }
    } catch(e){}
  });
  socket.on('rtc-leave', ({ from }) => {
    const pc = _hostPeers[from];
    if(pc){ pc.close(); delete _hostPeers[from]; }
  });
}

function emit(ev, data){ if(S.socket && S.connected) S.socket.emit(ev, data||{}); }

function buildState(){
  return {
    url: S.src,
    imdbId: S.currentImdbId||null,
    mediaType: S.currentType||'movie',
    season: S._currentSeason||null,
    episode: S._currentEpisode||null,
    title: S.currentMeta?.name||_embedTitle||'',
    time: getCT(),
    playing: S.playing,
  };
}

/* ══════════════════════════════════════════════════════
   HEARTBEAT
   ══════════════════════════════════════════════════════ */
let _heartbeatLoop = null;
function startHeartbeat(){
  if(_heartbeatLoop) clearInterval(_heartbeatLoop);
  _heartbeatLoop = setInterval(()=>{
    if(S.isHost && S.src && S.playing){
      emit('heartbeat', { time:getCT(), ts:Date.now() });
    }
  }, 5000);
}
function stopHeartbeat(){ if(_heartbeatLoop){ clearInterval(_heartbeatLoop); _heartbeatLoop=null; } }

/* ══════════════════════════════════════════════════════
   HOST UI
   ══════════════════════════════════════════════════════ */
function updateHostUI(){
  const cbar = $('cbar');
  const lock = $('iframeLock');
  const badge = $('hostBadge');
  const rtcBtn = $('btnRTC');
  if(S.isHost){
    cbar?.classList.remove('viewer-mode');
    lock?.classList.remove('active');
    badge?.classList.add('show');
    if(rtcBtn) rtcBtn.style.display='flex';
  } else {
    cbar?.classList.add('viewer-mode');
    if(S.iframe) lock?.classList.add('active');
    badge?.classList.remove('show');
    if(rtcBtn) rtcBtn.style.display='none';
  }
}

/* ══════════════════════════════════════════════════════
   WebRTC ENGINE
   ══════════════════════════════════════════════════════ */
const RTC_CONFIG = {
  iceServers: [
    { urls:'stun:stun.l.google.com:19302' },
    { urls:'stun:stun1.l.google.com:19302' },
    { urls:'turn:openrelay.metered.ca:80', username:'openrelayproject', credential:'openrelayproject' },
    { urls:'turn:openrelay.metered.ca:443', username:'openrelayproject', credential:'openrelayproject' },
    { urls:'turn:openrelay.metered.ca:443?transport=tcp', username:'openrelayproject', credential:'openrelayproject' },
  ]
};

let _hostStream = null;
let _hostPeers = {};   // socketId → RTCPeerConnection
let _viewerPc = null;
let _viewerVid = null;
let _rtcActive = false;

async function startHostStream(){
  if(!S.isHost){ toast('Only the host can share screen'); return; }
  try {
    _hostStream = await navigator.mediaDevices.getDisplayMedia({
      video:{ width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:30} },
      audio:{ echoCancellation:false, noiseSuppression:false, sampleRate:44100 }
    });
    _rtcActive = true;
    showHostPreview(_hostStream);
    emit('rtc-start');
    sysMsg('Screen share started — viewers connecting…');
    toast('Streaming to room!');
    updateRTCButton(true);
    // Connect to already-present viewers
    Object.keys(S.peers).forEach(uid => {
      // We need socket IDs for WebRTC, but we only know user IDs here.
      // The server will push rtc-join events from viewers who receive rtc-start.
    });
    _hostStream.getVideoTracks()[0].addEventListener('ended', ()=>{ stopHostStream(true); });
  } catch(e){
    if(e.name==='NotAllowedError') toast('Screen share permission denied');
    else if(e.name==='NotSupportedError') toast('Screen share not supported on this device');
    else toast('Screen share error: '+e.message);
  }
}

function stopHostStream(broadcast){
  if(_hostStream){ _hostStream.getTracks().forEach(t=>t.stop()); _hostStream=null; }
  Object.values(_hostPeers).forEach(pc=>pc.close());
  _hostPeers={};
  _rtcActive=false;
  updateRTCButton(false);

async function createHostPeerForViewer(viewerSocketId){
  if(_hostPeers[viewerSocketId]){ _hostPeers[viewerSocketId].close(); delete _hostPeers[viewerSocketId]; }
  const pc=new RTCPeerConnection(RTC_CONFIG);
  _hostPeers[viewerSocketId]=pc;
  _hostStream.getTracks().forEach(track=>pc.addTrack(track,_hostStream));
  pc.onicecandidate=e=>{ if(e.candidate) emit('rtc-ice',{to:viewerSocketId, candidate:e.candidate.toJSON()}); };
  pc.onconnectionstatechange=()=>{
    if(pc.connectionState==='failed'||pc.connectionState==='closed') delete _hostPeers[viewerSocketId];
  };
  try {
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    emit('rtc-offer',{ to:viewerSocketId, sdp:pc.localDescription.toJSON() });
  } catch(e){ console.error('[RTC] createOffer failed',e); }
}

async function handleHostOffer(sdp, hostSocketId){
  cleanupViewerRTC();
  const pc=new RTCPeerConnection(RTC_CONFIG);
  _viewerPc=pc;
  pc.onicecandidate=e=>{ if(e.candidate) emit('rtc-ice',{to:hostSocketId, candidate:e.candidate.toJSON()}); };
  pc.ontrack=e=>{ if(e.streams[0]) showViewerStream(e.streams[0]); };
  pc.onconnectionstatechange=()=>{
    if(pc.connectionState==='connected'){ _rtcActive=true; hideSyncBanner(); toast('Connected to host stream!'); }
    if(pc.connectionState==='failed'){ toast('Connection failed — retrying…'); setTimeout(()=>emit('rtc-join'),2000); }
  };
  try {
    await pc.setRemoteDescription(new RTCSessionDescription(sdp));
    const answer=await pc.createAnswer();
    await pc.setLocalDescription(answer);
    emit('rtc-answer',{ to:hostSocketId, sdp:pc.localDescription.toJSON() });
  } catch(e){ console.error('[RTC] handleHostOffer failed',e); }
}

function loadStream(url, title, autoplay){
  S.src=url;
  $('emptyState').classList.add('hidden');
  const wrap=$('playerWrap');
  if(S.video){ S.video.pause(); S.video.remove(); S.video=null; }
  if(S.iframe){ S.iframe.remove(); S.iframe=null; }
  wrap.querySelectorAll('.src-switcher').forEach(el=>el.remove());

  const isEmbed=/vidsrc\.|\/embed\/|youtube\.com\/embed|youtu\.be|vimeo\.com\/video|player\.|embed\.|autoembed\.|2embed\.|multiembed\./i.test(url);

  if(isEmbed){
    loadIframe(url, title, autoplay);
    return;
  }

  const v=document.createElement('video');
  v.src=url; v.controls=false; v.playsInline=true;
  v.volume=S.vol/100; v.muted=S.muted;
  v.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;display:block;z-index:1;';
  v.addEventListener('play',()=>{
    S.playing=true; $('btnPP').textContent='⏸';
    if(S.isHost&&!S._suppress) emit('play',{time:getCT()});
  });
  v.addEventListener('pause',()=>{
    S.playing=false; $('btnPP').textContent='▶';
    if(S.isHost&&!S._suppress) emit('pause',{time:getCT()});
  });
  v.addEventListener('ended',()=>{ S.playing=false; $('btnPP').textContent='▶'; });
  v.addEventListener('error',()=>{
    console.warn('video error — trying iframe fallback');
    v.remove(); S.video=null;
    loadIframe(url, title, autoplay);
  });
  wrap.appendChild(v); S.video=v;
  updateHostUI();
  if(autoplay!==false) v.play().catch(()=>{});
  if(!progressLoop) startProgress();
}

function loadIframe(url, title, autoplay){
  const wrap=$('playerWrap');
  if(S.iframe){ S.iframe.remove(); S.iframe=null; }
  hideOverlay();
  S._iframeStartOffset=0; S._iframeStartWallTime=null;
  const fr=document.createElement('iframe');
  fr.src=url;
  fr.allow='autoplay; fullscreen; picture-in-picture; encrypted-media; accelerometer; gyroscope; web-share';
  fr.allowFullscreen=true;
  fr.setAttribute('allowfullscreen','');
  fr.setAttribute('webkitallowfullscreen','');
  fr.setAttribute('mozallowfullscreen','');
  fr.setAttribute('playsinline','');
  fr.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:none;background:#000;display:block;z-index:1;';
  wrap.appendChild(fr); S.iframe=fr;
  updateHostUI();

  if(autoplay===false){
    S.playing=false; $('btnPP').textContent='▶';
    // On desktop, try to auto-start anyway
    if(!('ontouchstart' in window)){
      S._iframeStartWallTime=Date.now();
      S.playing=true; $('btnPP').textContent='⏸';
    }
  } else {
    S._iframeStartWallTime=Date.now();
    S.playing=true; $('btnPP').textContent='⏸';
  }
  startProgress();
  setTimeout(()=>renderSrcSwitcher(), 600);
}

function reloadIframeAtTime(t){
  if(!S.iframe||!S.src) return;
  const timeUrl=addTimeParam(S.src, Math.floor(t||0));
  S.iframe.src='about:blank';
  setTimeout(()=>{ if(S.iframe) S.iframe.src=timeUrl; }, 80);
}

function addTimeParam(url, seconds){
  if(!seconds||seconds<2) return url;
  try{
    const u=new URL(url);
    u.searchParams.set('t',seconds);
    return u.toString();
  }catch(e){
    return url+(url.includes('?')?'&':'?')+'t='+seconds;
  }
}

function iframeResume(){
  if(!S.iframe||!S.src) return;
  const src=S.src;
  S.iframe.src='about:blank';
  setTimeout(()=>{ if(S.iframe) S.iframe.src=src; }, 80);
}

function togglePlay(){
  if(!S.isHost){ toast('Only the host can control playback'); return; }
  S.playing ? pauseV(true) : playV(true);
}

function playV(broadcast){
  if(!S.video&&!S.iframe) return;
  if(!broadcast){ S._suppress=true; setTimeout(()=>S._suppress=false,200); }
  if(S.video){
    S.video.play().catch(()=>{});
    hideOverlay(); S.playing=true; $('btnPP').textContent='⏸';
  } else if(S.iframe){
    S._iframeStartWallTime=Date.now();
    iframeResume(); hideOverlay();
    S.playing=true; $('btnPP').textContent='⏸';
  }
  if(broadcast) emit('play',{time:getCT()});
}

function pauseV(broadcast){
  if(!S.video&&!S.iframe) return;
  if(!broadcast){ S._suppress=true; setTimeout(()=>S._suppress=false,200); }
  if(S.video){
    S.video.pause(); hideOverlay();
  } else if(S.iframe){
    if(S._iframeStartWallTime!=null){
      S._iframeStartOffset=getCT(); S._iframeStartWallTime=null;
    }
    showPauseOverlay();
  }
  S.playing=false; $('btnPP').textContent='▶';
  if(broadcast) emit('pause',{time:getCT()});
}

function seekClick(e){
  if(!S.isHost){ toast('Only the host can seek'); return; }
  if(!S.video&&!S.iframe) return;
  if(S.video){
    const r=$('pbar').getBoundingClientRect();
    S.video.currentTime=((e.clientX-r.left)/r.width)*S.video.duration||0;
    emit('seek',{time:getCT()});
  } else if(S.iframe){
    const r=$('pbar').getBoundingClientRect();
    const pct=(e.clientX-r.left)/r.width;
    const t=Math.floor(pct*(S._estDuration||7200));
    S._iframeStartOffset=t;
    if(S.playing){ reloadIframeAtTime(t); S._iframeStartWallTime=Date.now(); }
    emit('seek',{time:t});
  }
}

function getCT(){
  if(S.video) return S.video.currentTime||0;
  if(S.iframe&&S.playing&&S._iframeStartWallTime!=null){
    return S._iframeStartOffset+(Date.now()-S._iframeStartWallTime)/1000;
  }
  return S._iframeStartOffset||0;
}

function toggleMute(){ S.muted=!S.muted; if(S.video) S.video.muted=S.muted; $('btnMute').textContent=S.muted?'🔇':'🔊'; }
function setVol(v){ S.vol=+v; if(S.video) S.video.volume=v/100; }
function reqSync(){ emit('req-sync'); toast('Requesting sync from host…'); }
function flashSync(){ const p=$('syncPill'); p.classList.add('show'); setTimeout(()=>p.classList.remove('show'),2000); }
function showPauseOverlay(){ $('pauseOverlay').className='paused'; }
function hideOverlay(){ $('pauseOverlay').className=''; }
function showSyncBanner(){ const b=$('syncBanner'); if(b){b.textContent='⟳ SYNCING…'; b.classList.add('show');} }
function hideSyncBanner(){ $('syncBanner')?.classList.remove('show'); }

let progressLoop=null;
function startProgress(){
  if(progressLoop) clearInterval(progressLoop);
  progressLoop=setInterval(()=>{
    const cur=getCT();
    if(S.video){
      const dur=S.video.duration||0;
      $('pbarFill').style.width=(dur?cur/dur*100:0)+'%';
      $('tdisp').textContent=fmt(cur)+' / '+fmt(dur);
    } else if(S.iframe){
      $('tdisp').textContent=fmt(cur);
    }
  },500);
}

let _embedSources=[], _embedIdx=0, _embedTitle='';

function buildEmbedUrls(id, type, season, ep){
  const isSeries=type==='series'&&season;
  const s=season, e=ep;
  if(isSeries) return [
    {label:'VidSrc',    url:'https://vidsrc.cc/v2/embed/tv/'+id+'/'+s+'/'+e},
    {label:'AutoEmbed', url:'https://autoembed.co/tv/imdb/'+id+'-'+s+'-'+e},
    {label:'VidSrc.mov',url:'https://vidsrc.mov/embed/tv/'+id+'/'+s+'/'+e},
    {label:'2Embed',    url:'https://www.2embed.cc/embedtv/'+id+'?s='+s+'&e='+e},
    {label:'SuperEmbed',url:'https://multiembed.mov/directstream.php?video_id='+id+'&tmdb=1&s='+s+'&e='+e},
  ];
  return [
    {label:'VidSrc',    url:'https://vidsrc.cc/v2/embed/movie/'+id},
    {label:'AutoEmbed', url:'https://autoembed.co/movie/imdb/'+id},
    {label:'VidSrc.mov',url:'https://vidsrc.mov/embed/movie/'+id},
    {label:'2Embed',    url:'https://www.2embed.cc/embed/'+id},
    {label:'SuperEmbed',url:'https://multiembed.mov/directstream.php?video_id='+id+'&tmdb=1'},
  ];
}

function openStreamPicker(id, type, title){
  if(!S.isHost){ toast('Only the host can choose what to watch'); return; }
  S.currentImdbId=id; S.currentType=type;
  S._currentSeason=null; S._currentEpisode=null;
  _embedSources=buildEmbedUrls(id,type);
  _embedIdx=0; _embedTitle=title||id;
  emit('load-stream',{imdbId:id, mediaType:type, title:_embedTitle});
  playEmbed(0);
}

function playEmbed(idx){
  if(idx<0||idx>=_embedSources.length) idx=0;
  _embedIdx=idx;
  loadStream(_embedSources[idx].url, _embedTitle, true);
}

function switchSource(idx){
  _embedIdx=idx;
  if(S.iframe){ S.iframe.remove(); S.iframe=null; }
  $('playerWrap').querySelectorAll('.src-switcher').forEach(el=>el.remove());
  loadStream(_embedSources[idx].url, _embedTitle, true);
}

function renderSrcSwitcher(){
  const wrap=$('playerWrap');
  wrap.querySelectorAll('.src-switcher').forEach(el=>el.remove());
  if(!_embedSources.length) return;
  const bar=document.createElement('div');
  bar.className='src-switcher';
  _embedSources.forEach((src,i)=>{
    const btn=document.createElement('button');
    btn.textContent=src.label;
    btn.onclick=()=>switchSource(i);
    const active=i===_embedIdx;
    btn.style.cssText='background:'+(active?'rgba(232,184,75,.25)':'rgba(7,8,13,.8)')+';border:1px solid '+(active?'rgba(232,184,75,.6)':'rgba(255,255,255,.1)')+';border-radius:6px;padding:.22rem .55rem;color:'+(active?'var(--gold)':'rgba(238,234,224,.55)')+';font-family:\'DM Mono\',monospace;font-size:.58rem;cursor:pointer;backdrop-filter:blur(8px);white-space:nowrap;min-height:28px;';
    bar.appendChild(btn);
  });
  wrap.appendChild(bar);
}

async function fetchStreams(){
  if(!S.isHost){ toast('Only the host can load streams'); return; }
  const addonUrl=$('addonUrlInp').value.trim();
  if(!addonUrl){ toast('Paste an addon URL first'); return; }
  if(!S.currentImdbId){ toast('Select a movie first'); return; }
  S.addonUrl=addonUrl; localStorage.setItem('rp_addon',addonUrl);
  $('streamList').innerHTML='<div class="sp-loading"><span class="spin">⟳</span> Fetching streams…</div>';
  const base=addonUrl.replace(/\/manifest\.json.*$/,'');
  const streamUrl=base+'/stream/'+S.currentType+'/'+S.currentImdbId+'.json';
  const streams=await tryFetchStreams(streamUrl);
  if(streams) renderStreams(streams);
  else $('streamList').innerHTML='<div class="sp-empty"><div>⚠️</div><div>Could not fetch streams</div><div style="font-size:.7rem;margin-top:.4rem">Try a different addon or paste a direct URL below</div><div style="margin-top:.75rem;width:100%;padding:0 .5rem"><button onclick="showManualInput()" style="width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:7px;padding:.5rem;color:var(--text);font-size:.75rem;cursor:pointer">🔗 Paste Direct Video URL</button></div></div>';
}

async function tryFetchStreams(url){
  const d=await fetchJson(url);
  if(d&&Array.isArray(d.streams)) return d.streams;
  return null;
}

function showManualInput(){
  $('streamList').innerHTML='<div style="padding:.8rem;display:flex;flex-direction:column;gap:.6rem"><div style="font-size:.78rem;color:var(--muted)">Paste a direct video URL:</div><input id="manualUrl" class="inp" type="text" placeholder="https://…/video.mp4 or .m3u8" style="margin:0"><input id="manualName" class="inp" type="text" placeholder="Name (optional)" style="margin:0"><button class="btn-gold" onclick="playManualUrl()">▶ PLAY</button></div>';
  setTimeout(()=>$('manualUrl')&&$('manualUrl').focus(),50);
}

function playManualUrl(){
  const url=$('manualUrl')?.value.trim();
  if(!url){ toast('Enter a URL'); return; }
  const name=$('manualName')?.value.trim()||'Stream';
  selectStream(url, name);
}

function selectStream(url, title){
  if(!S.isHost){ toast('Only the host can choose the stream'); return; }
  loadStream(url, title, true);
  emit('load-stream',{url, title});
  closeStreamPicker();
  toast('▶ Playing for everyone');
}

function renderStreams(streams){
  if(!streams.length){ $('streamList').innerHTML='<div class="sp-empty"><div>🔍</div><div>No streams found</div></div>'; return; }
  window._streams=streams;
  $('streamList').innerHTML=streams.map((s,i)=>{
    const name=s.name||('Stream '+(i+1));
    const desc=s.description||s.title||'';
    const hasDirect=s.url&&(s.url.startsWith('http')||s.url.startsWith('//'));
    let btn='';
    if(hasDirect) btn=`<button class="si-play" onclick="selectStream(window._streams[${i}].url,'${esc(name)}')">▶ Play</button>`;
    else if(s.externalUrl) btn=`<button class="si-play" onclick="selectStream('${esc(s.externalUrl)}','${esc(name)}')">▶ Play</button>`;
    else btn=`<button class="si-play" style="background:var(--surface3);color:var(--muted)">N/A</button>`;
    const qual=(name+' '+desc).match(/4K|2160p|1080p|720p|480p/i);
    return `<div class="stream-item"><div class="si-icon">▶</div><div class="si-info"><div class="si-name">${esc(name)}${qual?`<span style="font-size:.6rem;background:rgba(75,143,232,.15);color:var(--blue);border-radius:3px;padding:.05rem .3rem;margin-left:.2rem">${qual[0]}</span>`:''}</div><div class="si-desc">${esc(desc.slice(0,90))}</div></div>${btn}</div>`;
  }).join('');
}

}

async function fetchJson(url){
  const T=6000, enc=encodeURIComponent(url);
  const attempts=[
    fetch(url,{signal:AbortSignal.timeout(T)}).then(r=>r.ok?r.json():null).catch(()=>null),
    fetch('https://api.allorigins.win/get?url='+enc,{signal:AbortSignal.timeout(T)}).then(r=>r.ok?r.json():null).then(j=>j?.contents?JSON.parse(j.contents):null).catch(()=>null),
    fetch('https://corsproxy.io/?'+enc,{signal:AbortSignal.timeout(T)}).then(r=>r.ok?r.json():null).catch(()=>null),
  ];
  return new Promise(resolve=>{
    let done=false,left=attempts.length;
    attempts.forEach(p=>p.then(val=>{if(!done&&val!==null){done=true;resolve(val);}if(--left===0&&!done)resolve(null);}));
  });
}

async function doSearch(){
  const q=$('searchInp').value.trim(); if(!q){loadPopular();return;}
  $('catalogGrid').innerHTML='<div style="padding:1rem;color:var(--muted);font-size:.8rem"><span class="spin">⟳</span> Searching…</div>';
  const [d1,d2]=await Promise.all([
    fetchJson(CINEMETA+'/catalog/movie/top/search='+encodeURIComponent(q)+'.json'),
    fetchJson(CINEMETA+'/catalog/series/top/search='+encodeURIComponent(q)+'.json')
  ]);
  const metas=[...((d1?.metas)||[]),...((d2?.metas)||[])];
  if(metas.length) renderResults(metas);
  else $('catalogGrid').innerHTML='<div style="padding:1rem;color:var(--muted);font-size:.8rem">No results found</div>';
}

function renderResults(metas){
  if(!metas.length){$('catalogGrid').innerHTML='<div style="padding:1rem;color:var(--muted);font-size:.8rem">No results found</div>';return;}
  $('catalogGrid').innerHTML=metas.slice(0,40).map(m=>`
    <div class="movie-card" onclick="openDetail('${esc(m.id)}','${esc(m.type||'movie')}')">
      <img class="mc-poster" src="${m.poster||''}" alt="" onerror="this.style.display='none'">
      <div class="mc-info">
        <div class="mc-title">${esc(m.name||'')}</div>
        <div class="mc-meta">${m.releaseInfo||''} ${m.type==='series'?'· Series':''}</div>
        ${m.imdbRating?`<div class="mc-rating">★ ${m.imdbRating}</div>`:''}
        <button class="mc-btn" onclick="event.stopPropagation();openStreamPickerOrEp('${esc(m.id)}','${esc(m.type||'movie')}','${esc(m.name||'')}')">▶ Watch</button>
      </div>
    </div>`).join('');
}

function openStreamPickerOrEp(id, type, title){
  if(!S.isHost){ toast('Only the host can choose what to watch'); return; }
  if(type==='series') openEpPicker(id, title);
  else openStreamPicker(id, type, title);
}

/* ── Detail modal ── */
let detailImdbId='', detailType='movie';
async function openDetail(id, type){
  detailImdbId=id; detailType=type;
  $('detailModal').classList.add('open');
  $('dmTitle').textContent='Loading…'; $('dmDesc').textContent='';
  const fallback=POPULAR_FALLBACK.find(m=>m.id===id);
  if(fallback){ $('dmTitle').textContent=fallback.name; $('dmYear').textContent=fallback.releaseInfo||''; $('dmRating').textContent=fallback.imdbRating?'★ '+fallback.imdbRating+' IMDb':''; $('dmPoster').src=fallback.poster||''; $('dmBg').src=fallback.poster||''; }
  try{
    const d=await fetchJson(`${CINEMETA}/meta/${type}/${id}.json`);
    const m=d?.meta||{};
    if(!m.name) throw new Error('no meta');
    S.currentMeta=m;
    $('dmTitle').textContent=m.name||id; $('dmYear').textContent=m.releaseInfo||'';
    $('dmRating').textContent=m.imdbRating?'★ '+m.imdbRating+' IMDb':'';
    $('dmDesc').textContent=m.description||'No description available.';
    $('dmTags').innerHTML=(m.genres||[]).map(g=>`<span class="dm-tag">${esc(g)}</span>`).join('');
    if(m.background||m.poster){ $('dmBg').src=m.background||m.poster; } else $('dmBg').style.display='none';
    $('dmPoster').src=m.poster||'';
  }catch(e){
    if(!S.currentMeta) S.currentMeta={name:fallback?.name||id,id};
    if(!$('dmDesc').textContent) $('dmDesc').textContent='No description available.';
  }
}
function closeDetail(){ $('detailModal').classList.remove('open'); }
function watchFromDetail(){
  closeDetail();
  if(!S.isHost){ toast('Only the host can choose what to watch'); return; }
  if(detailType==='series') openEpPicker(detailImdbId, S.currentMeta?.name||detailImdbId);
  else openStreamPicker(detailImdbId, detailType, S.currentMeta?.name||detailImdbId);
}
$('detailModal').addEventListener('click',e=>{ if(e.target===$('detailModal')) closeDetail(); });

/* ── Episode picker ── */
let _epImdbId='', _epTitle='';
function openEpPicker(id, title){
  _epImdbId=id; _epTitle=title;
  $('epPickerTitle').textContent=title||'Pick Episode';
  $('epPicker').classList.add('open');
  setTimeout(()=>$('epS').focus(),50);
}
function closeEpPicker(){ $('epPicker').classList.remove('open'); }
function playEp(){
  const s=parseInt($('epS').value)||1, e=parseInt($('epE').value)||1;
  closeEpPicker();
  const label=_epTitle+' S'+String(s).padStart(2,'0')+'E'+String(e).padStart(2,'0');
  S.currentImdbId=_epImdbId; S.currentType='series';
  S._currentSeason=s; S._currentEpisode=e;
  _embedSources=buildEmbedUrls(_epImdbId,'series',s,e);
  _embedIdx=0; _embedTitle=label;
  emit('load-stream',{imdbId:_epImdbId, mediaType:'series', season:s, episode:e, title:label});
  playEmbed(0);
}

/* ══════════════════════════════════════════════════════
   CHAT
   ══════════════════════════════════════════════════════ */
function sendChat(){
  const t=$('chatInp').value.trim(); if(!t) return; $('chatInp').value='';
  renderMsg({name:S.name, text:t}, true);
  emit('chat',{text:t});
}

function renderMsg(m, isMe){
  const box=$('chatMsgs');
  const d=document.createElement('div'); d.className='msg'+(isMe?' me':'');
  d.innerHTML=`${!isMe?`<div class="msg-n">${esc(m.name)}</div>`:''}<div class="msg-b">${esc(m.text)}</div>`;
  box.appendChild(d); box.scrollTop=box.scrollHeight;
}

function sysMsg(t){
  const box=$('chatMsgs'); const d=document.createElement('div'); d.className='msg sys';
  d.innerHTML=`<div class="msg-b">${esc(t)}</div>`; box.appendChild(d); box.scrollTop=box.scrollHeight;
}

/* ══════════════════════════════════════════════════════
   PANELS
   ══════════════════════════════════════════════════════ */
function openPanel(tab){
  const same=S.panelOpen&&S.panelTab===tab;
  S.panelOpen=!same; S.panelTab=tab;
  $('side').classList.toggle('open',S.panelOpen);
  ['search','chat','viewers'].forEach(t=>{$('btn'+{search:'Search',chat:'Chat',viewers:'Viewers'}[t])?.classList.toggle('active',S.panelOpen&&tab===t);});
  if(S.panelOpen) switchPTab(tab);
  if(tab==='chat'&&S.panelOpen){ S.unread=0; $('chatBadge').classList.add('hidden'); $('chatMsgs').scrollTop=$('chatMsgs').scrollHeight; }
}

function closePanel(){ S.panelOpen=false; $('side').classList.remove('open'); ['btnSearch','btnChat','btnViewers'].forEach(id=>$(id)?.classList.remove('active')); }

function switchPTab(tab){
  S.panelTab=tab;
  document.querySelectorAll('.pt').forEach((b,i)=>b.classList.toggle('active',['search','chat','viewers'][i]===tab));
  ['pc-search','pc-chat','pc-viewers'].forEach(id=>$(id).classList.toggle('active',id==='pc-'+tab));
  if(tab==='chat'){ S.unread=0; $('chatBadge').classList.add('hidden'); }
}

/* ══════════════════════════════════════════════════════
   VIEWERS
   ══════════════════════════════════════════════════════ */
function renderViewers(){
  const list=$('viewerList'); list.innerHTML='';
  const all=[{id:S.myId, name:S.name, isMe:true}, ...Object.entries(S.peers).map(([id,name])=>({id,name,isMe:false}))];
  $('vcnt').textContent=all.length;
  all.forEach(v=>{
    const d=document.createElement('div'); d.className='vrow';
    const isHost=v.isMe?S.isHost:false; // we only know if we are host; peers' status simplified
    d.innerHTML=`<div class="vav" style="background:${avc(v.name)}">${avl(v.name)}</div><div class="vname">${esc(v.name)}${v.isMe?' (You)':''}</div>${(v.isMe&&S.isHost)?'<span class="vbadge">HOST</span>':''}`;
    list.appendChild(d);
  });
}

/* ══════════════════════════════════════════════════════
   MISC
   ══════════════════════════════════════════════════════ */
function setDot(on){ $('connDot').classList.toggle('on',on); }

function copyRoomLink(){
  const link=location.origin+'/?room='+S.room;
  navigator.clipboard?.writeText(link).then(()=>toast('Invite link copied!')).catch(()=>toast('Code: '+S.room));
}

function toast(msg, dur=3000){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

function leaveRoom(){
  if(!confirm('Leave room?')) return;
  if(progressLoop){ clearInterval(progressLoop); progressLoop=null; }
  stopHeartbeat();
  if(S.isHost&&_rtcActive) stopHostStream(true);
  else if(_viewerPc){ emit('rtc-leave'); cleanupViewerRTC(); }
  S.socket?.disconnect();
  if(S.video){ S.video.pause(); S.video.remove(); S.video=null; }
  if(S.iframe){ S.iframe.remove(); S.iframe=null; }
  $('room').style.display='none'; $('landing').style.display='flex';
  $('emptyState').classList.remove('hidden'); $('chatMsgs').innerHTML='';
  $('iframeLock').classList.remove('active'); $('hostBadge').classList.remove('show');
  $('cbar').classList.remove('viewer-mode');
  $('playerWrap').querySelectorAll('.src-switcher,.rtc-host-video,.rtc-viewer-video,.rtc-live-badge,.unmute-ov').forEach(el=>el.remove());
  S.peers={}; S.src=null; S.playing=false; S.iframe=null; S.video=null; S.hostSocketId=null; S.connected=false;
  $('pbarFill').style.width='0%'; $('tdisp').textContent='0:00 / 0:00';
  history.replaceState(null,'','/');
}

window.addEventListener('beforeunload', ()=>{ try{ S.socket?.disconnect(); }catch(e){} });
</script>
